<!DOCTYPE html>

<head>

// ====== 侧边栏布局 ======
const DRAWER_WIDTH = 240;

const menuItems = [
  { label: '仪表盘', icon: <Icon name="dashboard" />, page: 'dashboard' },
  { label: '房东管理', icon: <Icon name="landlord" />, page: 'landlords' },
  { label: '房源管理', icon: <Icon name="apartment" />, page: 'properties' },
  { label: '房间管理', icon: <Icon name="room" />, page: 'rooms' },
  { label: '租客管理', icon: <Icon name="people" />, page: 'tenants' },
  { label: '收租管理', icon: <Icon name="receipt" />, page: 'bills' },
  { label: '合同管理', icon: <Icon name="desc" />, page: 'contracts' },
  { label: '数据统计', icon: <Icon name="bar" />, page: 'statistics' },
  { label: '系统设置', icon: <Icon name="settings" />, page: 'settings' },
];

function MainLayout() {
  const [page, setPage] = useState('dashboard');
  const [showLogin, setShowLogin] = useState(true);

  if (showLogin) {
    return <LoginPage onLogin={() => setShowLogin(false)} />;
  }

  return (
    <Box sx={{ display: 'flex', minHeight: '100vh', bgcolor: '#f5f5f5' }}>
      <Drawer variant="permanent" sx={{ width: DRAWER_WIDTH, '& .MuiDrawer-paper': { width: DRAWER_WIDTH, bgcolor: '#1A1A2E', color: '#fff', borderRight: 'none' } }}>
        <Box sx={{ p: 3, borderBottom: '1px solid rgba(255,255,255,0.1)' }}>
          <Typography variant="h6" fontWeight={700} color="#F5D78E">本地房东</Typography>
          <Typography variant="caption" color="rgba(255,255,255,0.5)">管理后台 v1.0</Typography>
        </Box>
        <List sx={{ px: 1, pt: 2 }}>
          {menuItems.map(item => (
            <ListItemButton key={item.page} onClick={() => setPage(item.page)}
              sx={{ borderRadius: 2, mb: 0.5, color: page === item.page ? '#F5D78E' : 'rgba(255,255,255,0.7)',
                bgcolor: page === item.page ? 'rgba(245,215,142,0.1)' : 'transparent',
                '&:hover': { bgcolor: 'rgba(255,255,255,0.08)' } }}>
              <ListItemIcon sx={{ color: 'inherit', minWidth: 40 }}>{item.icon}</ListItemIcon>
              <ListItemText primary={item.label} />
            </ListItemButton>
          ))}
        </List>
      </Drawer>
      <Box sx={{ flex: 1, display: 'flex', flexDirection: 'column' }}>
        <AppBar position="static" elevation={0} sx={{ bgcolor: '#fff', color: '#333' }}>
          <Toolbar>
            <Box sx={{ flex: 1 }} />
            <Typography variant="body2" sx={{ mr: 2 }}>超级管理员</Typography>
            <IconButton color="inherit" size="small" onClick={() => setShowLogin(true)}><Icon name="logout" /></IconButton>
          </Toolbar>
        </AppBar>
        <Box sx={{ flex: 1, p: 3, overflow: 'auto' }}>
          {page === 'dashboard' && <DashboardPage />}
          {page === 'landlords' && <LandlordPage />}
          {page === 'properties' && <PropertyPage />}
          {page === 'rooms' && <RoomPage />}
          {page === 'tenants' && <TenantPage />}
          {page === 'bills' && <BillPage />}
          {page === 'contracts' && <ContractPage />}
          {page === 'statistics' && <StatisticsPage />}
          {page === 'settings' && <SettingsPage />}
        </Box>
      </Box>
    </Box>
  );
}

// ====== 登录页 ======
function LoginPage({ onLogin }) {
  const [username, setUsername] = useState('');
  const [password, setPassword] = useState('');
  const [error, setError] = useState('');

  const handleLogin = () => {
    if (username === 'admin' && password === 'admin123') {
      onLogin();
    } else {
      setError('账号或密码错误');
    }
  };

  return (
    <Box sx={{ minHeight: '100vh', width: '100vw', display: 'flex', alignItems: 'center', justifyContent: 'center', bgcolor: '#f5f5f5' }}>
      <Card sx={{ width: 400, p: 5 }}>
        <Typography variant="h5" fontWeight={700} textAlign="center" mb={1}>本地房东</Typography>
        <Typography variant="body2" color="text.secondary" textAlign="center" mb={4}>管理后台登录</Typography>
        {error && <Alert severity="error" sx={{ mb: 2 }}>{error}</Alert>}
        <TextField fullWidth label="用户名" value={username} onChange={e => setUsername(e.target.value)} sx={{ mb: 2 }} />
        <TextField fullWidth label="密码" type="password" value={password} onChange={e => setPassword(e.target.value)} sx={{ mb: 3 }}
          onKeyDown={e => e.key === 'Enter' && handleLogin()} />
        <Button fullWidth variant="contained" onClick={handleLogin}
          sx={{ py: 1.5, bgcolor: '#F5D78E', color: '#4A4038', fontWeight: 700, '&:hover': { bgcolor: '#EBCB6E' } }}>登录</Button>
        <Typography variant="caption" color="text.secondary" textAlign="center" display="block" mt={2}>
          默认账号: admin / admin123 (点击直接登录)
        </Typography>
      </Card>
    </Box>
  );
}

// ====== 仪表盘 ======
function DashboardPage() {
  const stats = [
    { icon: <Icon name="landlord" />, label: '总房东数', value: 48, color: '#F5D78E' },
    { icon: <Icon name="apartment" />, label: '总房源数', value: 12, color: '#7BA37B' },
    { icon: <Icon name="people" />, label: '在租租客', value: 41, color: '#6B8FBF' },
    { icon: <Icon name="trending" />, label: '本月收租率', value: '85%', color: '#C97B7B' },
  ];

  return (
    <Box>
      <Typography variant="h5" fontWeight={700} mb={3}>仪表盘</Typography>
      <Grid container spacing={3} mb={4}>
        {stats.map((s, i) => (
          <Grid key={i} size={{ xs: 12, sm: 6, md: 3 }}>
            <Card sx={{ p: 3, display: 'flex', alignItems: 'center', gap: 2 }}>
              <Box sx={{ width: 48, height: 48, borderRadius: 3, display: 'flex', alignItems: 'center', justifyContent: 'center', bgcolor: s.color + '22' }}>
                <Box sx={{ color: s.color }}>{s.icon}</Box>
              </Box>
              <Box>
                <Typography variant="h4" fontWeight={700}>{s.value}</Typography>
                <Typography variant="body2" color="text.secondary">{s.label}</Typography>
              </Box>
            </Card>
          </Grid>
        ))}
      </Grid>
      <Grid container spacing={3}>
        <Grid size={{ xs: 12, md: 8 }}>
          <Card sx={{ p: 3 }}>
            <Typography variant="h6" fontWeight={600} mb={2}>近期收租趋势</Typography>
            <Box sx={{ height: 300, display: 'flex', alignItems: 'center', justifyContent: 'center', bgcolor: '#fafafa', borderRadius: 2 }}>
              <Typography color="text.secondary">📊 收租趋势图表（本地环境启动后激活 ECharts）</Typography>
            </Box>
          </Card>
        </Grid>
        <Grid size={{ xs: 12, md: 4 }}>
          <Card sx={{ p: 3, mb: 3 }}>
            <Typography variant="h6" fontWeight={600} mb={2}>待处理事项</Typography>
            {[{ label: '逾期账单', count: 3, color: '#C97B7B' }, { label: '即将到期', count: 5, color: '#E8B87D' }, { label: '今日待收', count: 2, color: '#F5D78E' }].map(item => (
              <Box key={item.label} sx={{ display: 'flex', justifyContent: 'space-between', py: 1, borderBottom: '1px solid #f0f0f0' }}>
                <Typography>{item.label}</Typography>
                <Typography variant="h6" fontWeight={700} color={item.color}>{item.count}</Typography>
              </Box>
            ))}
          </Card>
          <Card sx={{ p: 3 }}>
            <Typography variant="h6" fontWeight={600} mb={2}>房源入住率</Typography>
            {[{ name: '阳光花园', rate: 83 }, { name: '翠竹苑', rate: 88 }, { name: '明月阁', rate: 83 }].map(item => (
              <Box key={item.name} sx={{ mb: 1.5 }}>
                <Box sx={{ display: 'flex', justifyContent: 'space-between', mb: 0.5 }}>
                  <Typography variant="body2">{item.name}</Typography>
                  <Typography variant="body2" fontWeight={600}>{item.rate}%</Typography>
                </Box>
                <Box sx={{ bgcolor: '#f0f0f0', borderRadius: 4, height: 8, overflow: 'hidden' }}>
                  <Box sx={{ width: `${item.rate}%`, height: '100%', bgcolor: '#F5D78E', borderRadius: 4 }} />
                </Box>
              </Box>
            ))}
          </Card>
        </Grid>
      </Grid>
    </Box>
  );
}

// ====== 房东管理 ======
function LandlordPage() {
  const [open, setOpen] = useState(false);
  const [edit, setEdit] = useState({ name: '', phone: '' });
  const [data, setData] = useState([
    { id: 1, name: '张秀英', phone: '138****2345', regDate: '2025-08-15', propertyCount: 5, roomCount: 22, activeCount: 18, status: '活跃', maxProperties: 10, avatar: '' },
    { id: 2, name: '李明华', phone: '139****6789', regDate: '2025-10-03', propertyCount: 3, roomCount: 14, activeCount: 12, status: '活跃', maxProperties: 5, avatar: '' },
    { id: 3, name: '王建国', phone: '136****3456', regDate: '2026-01-20', propertyCount: 2, roomCount: 8, activeCount: 7, status: '活跃', maxProperties: 10, avatar: '' },
    { id: 4, name: '陈美玲', phone: '135****7890', regDate: '2025-06-01', propertyCount: 1, roomCount: 4, activeCount: 4, status: '已禁用', maxProperties: 3, avatar: '' },
  ]);

  const save = () => {
    if (edit.id) {
      setData(data.map(d => d.id === edit.id ? { ...d, ...edit } : d));
    } else {
      setData([...data, { ...edit, id: Date.now(), regDate: new Date().toISOString().slice(0,10), propertyCount: 0, roomCount: 0, activeCount: 0, status: '活跃', maxProperties: edit.maxProperties ?? 10, avatar: edit.avatar || '' }]);
    }
    setOpen(false);
    setEdit({ name: '', phone: '' });
  };

  const toggleStatus = (id) => {
    setData(data.map(d => d.id === id ? { ...d, status: d.status === '活跃' ? '已禁用' : '活跃' } : d));
  };

  return (
    <Box>
      <Box sx={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', mb: 3 }}>
        <Typography variant="h5" fontWeight={700}>房东管理</Typography>
        <Button variant="contained" startIcon={<Icon name="add" />} onClick={() => { setEdit({ name: '', phone: '' }); setOpen(true); }}
          sx={{ bgcolor: '#F5D78E', color: '#4A4038', fontWeight: 600 }}>新增房东</Button>
      </Box>
      <Card>
        <TableContainer><Table>
          <TableHead><TableRow>
            <TableCell>姓名</TableCell><TableCell>电话</TableCell><TableCell>注册时间</TableCell><TableCell>房源数</TableCell><TableCell>房间数</TableCell><TableCell>在租数</TableCell><TableCell>状态</TableCell><TableCell>操作</TableCell>
          </TableRow></TableHead>
          <TableBody>
            {data.map(row => (
              <TableRow key={row.id} sx={{ cursor: 'pointer' }}>
                <TableCell><Typography fontWeight={600}>{row.name}</Typography></TableCell>
                <TableCell>{row.phone}</TableCell>
                <TableCell>{row.regDate}</TableCell>
                <TableCell>{row.propertyCount}</TableCell>
                <TableCell>{row.roomCount}</TableCell>
                <TableCell>{row.activeCount}</TableCell>
                <TableCell>{row.propertyCount}/{row.maxProperties ?? 10}</TableCell>
                <TableCell>
                  <Chip label={row.status} size="small" color={row.status === '活跃' ? 'success' : 'default'}
                    onClick={() => toggleStatus(row.id)} />
                </TableCell>
                <TableCell>
                  <Button size="small" sx={{ mr: 1 }}>详情</Button>
                  <IconButton size="small" onClick={() => { setEdit(row); setOpen(true); }}><Icon name="edit" /></IconButton>
                  <IconButton size="small" onClick={() => toggleStatus(row.id)}>
                    <Icon name={row.status === '活跃' ? 'del' : 'add'} />
                  </IconButton>
                </TableCell>
              </TableRow>
            ))}
          </TableBody>
        </Table></TableContainer>
      </Card>
      <Dialog open={open} onClose={() => setOpen(false)} maxWidth="sm" fullWidth>
        <DialogTitle>{edit.id ? '编辑房东' : '新增房东'}</DialogTitle>
        <DialogContent>
          <TextField fullWidth label="姓名" value={edit.name} onChange={e => setEdit({ ...edit, name: e.target.value })} sx={{ mt: 1, mb: 2 }} />
          <TextField fullWidth label="电话" value={edit.phone || ''} onChange={e => setEdit({ ...edit, phone: e.target.value })} sx={{ mb: 2 }} />
          <TextField fullWidth label="默认收款人" value={edit.payeeName || ''} onChange={e => setEdit({ ...edit, payeeName: e.target.value })} sx={{ mb: 2 }} />
          <TextField fullWidth label="收款说明" value={edit.paymentNote || ''} onChange={e => setEdit({ ...edit, paymentNote: e.target.value })} multiline rows={2} sx={{ mb: 2 }} />
          <TextField fullWidth label="头像URL" value={edit.avatar || ''} onChange={e => setEdit({ ...edit, avatar: e.target.value })} sx={{ mb: 2 }} />
          <TextField fullWidth label="最大房源数" type="number" value={edit.maxProperties ?? 10} onChange={e => setEdit({ ...edit, maxProperties: parseInt(e.target.value) || 0 })} sx={{ mb: 2 }} helperText="0 表示不限制" />
          <Box sx={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
            <Typography>启用状态</Typography>
            <Switch checked={edit.status !== 0} onChange={e => setEdit({ ...edit, status: e.target.checked ? 1 : 0 })} />
          </Box>
        </DialogContent>
        <DialogActions>
          <Button onClick={() => setOpen(false)}>取消</Button>
          <Button variant="contained" onClick={save} sx={{ bgcolor: '#F5D78E', color: '#4A4038' }}>保存</Button>
        </DialogActions>
      </Dialog>
    </Box>
  );
}

// ====== 房源管理 ======
function PropertyPage() {
  const [open, setOpen] = useState(false);
  const [edit, setEdit] = useState({ name: '', address: '' });
  const [data, setData] = useState([
    { id: 1, name: '阳光花园', address: '朝阳区建国路88号', roomCount: 12, rentedCount: 10, vacantCount: 2, landlordName: '张秀英' },
    { id: 2, name: '翠竹苑', address: '海淀区中关村大街1号', roomCount: 8, rentedCount: 7, vacantCount: 1, landlordName: '李明华' },
    { id: 3, name: '明月阁', address: '浦东新区陆家嘴路100号', roomCount: 6, rentedCount: 5, vacantCount: 1, landlordName: '张秀英' },
  ]);

  const save = () => {
    if (edit.id) {
      setData(data.map(d => d.id === edit.id ? { ...d, ...edit } : d));
    } else {
      setData([...data, { ...edit, id: Date.now(), roomCount: 0, rentedCount: 0, vacantCount: 0 }]);
    }
    setOpen(false);
    setEdit({ name: '', address: '' });
  };

  return (
    <Box>
      <Box sx={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', mb: 3 }}>
        <Typography variant="h5" fontWeight={700}>房源管理</Typography>
        <Button variant="contained" startIcon={<Icon name="add" />} onClick={() => { setEdit({ name: '', address: '' }); setOpen(true); }}
          sx={{ bgcolor: '#F5D78E', color: '#4A4038', fontWeight: 600 }}>新增房源</Button>
      </Box>
      <Card>
        <TableContainer><Table>
          <TableHead><TableRow>
            <TableCell>房源名称</TableCell><TableCell>所属房东</TableCell><TableCell>地址</TableCell><TableCell>房间数</TableCell><TableCell>已租</TableCell><TableCell>空置</TableCell><TableCell>操作</TableCell>
          </TableRow></TableHead>
          <TableBody>
            {data.map(row => (
              <TableRow key={row.id}>
                <TableCell><Typography fontWeight={600}>{row.name}</Typography></TableCell>
                <TableCell>{row.landlordName || '-'}</TableCell>
                <TableCell>{row.address || '-'}</TableCell>

  const data = [
    { id: 1, room: '阳光花园 101室', tenant: '李小明', period: '2026-05', total: 3790, status: '待支付', sentAt: '2026-05-10' },

  ];

  const toggle = id => setSelected(selected.includes(id) ? selected.filter(s => s !== id) : [...selected, id]);

  return (
    <Box>

          <Button variant="outlined" disabled={!selected.length} onClick={() => setConfirmOpen(true)}>批量确认收款</Button>

        </Box>
      </Box>
      <Card>
        <TableContainer><Table>
          <TableHead><TableRow>
            <TableCell padding="checkbox"><Checkbox checked={selected.length === data.length} onChange={() => setSelected(selected.length ? [] : data.map(b => b.id))} /></TableCell>
            <TableCell>房间</TableCell><TableCell>租客</TableCell><TableCell>周期</TableCell><TableCell>合计</TableCell>
            <TableCell>状态</TableCell><TableCell>发送</TableCell><TableCell>收款</TableCell><TableCell>操作</TableCell>
          </TableRow></TableHead>
          <TableBody>
            {data.map(row => (
              <TableRow key={row.id}>
                <TableCell padding="checkbox"><Checkbox checked={selected.includes(row.id)} onChange={() => toggle(row.id)} /></TableCell>
                <TableCell>{row.room}</TableCell><TableCell>{row.tenant}</TableCell><TableCell>{row.period}</TableCell>
                <TableCell><Typography fontWeight={700}>{row.total.toLocaleString()} 元</Typography></TableCell>
                <TableCell><Chip label={row.status} size="small" color={row.status === '已收' ? 'success' : row.status === '逾期' ? 'error' : 'warning'} /></TableCell>
                <TableCell>{row.sentAt}</TableCell><TableCell>{row.paidAt || '-'}</TableCell>
                <TableCell>
                  {row.status === '待支付' && <Button size="small" onClick={() => setConfirmOpen(true)} sx={{ mr: 1 }}>确认收款</Button>}
                  <Button size="small" color="error">催缴</Button>
                </TableCell>
              </TableRow>
            ))}
          </TableBody>
        </Table></TableContainer>
      </Card>
      <Dialog open={confirmOpen} onClose={() => setConfirmOpen(false)} maxWidth="xs" fullWidth>
        <DialogTitle>确认收款</DialogTitle>
        <DialogContent>
          <Typography variant="body2" color="text.secondary" mb={2}>确认已收到 {selected.length || 1} 笔房租？</Typography>
          <TextField fullWidth label="收款日期" type="date" value={confirmDate} onChange={e => setConfirmDate(e.target.value)} InputLabelProps={{ shrink: true }} />
        </DialogContent>
        <DialogActions>
          <Button onClick={() => setConfirmOpen(false)}>取消</Button>
          <Button variant="contained" onClick={() => setConfirmOpen(false)} sx={{ bgcolor: '#7BA37B', color: '#fff' }}>确认收款</Button>
        </DialogActions>
      </Dialog>
    </Box>
  );
}
