version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: local-landlord-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-local_landlord_2026}
      MYSQL_DATABASE: local_landlord
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
    ports:
      - '3306:3306'
    volumes:
      - mysql_data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

  redis:
    image: redis:7-alpine
    container_name: local-landlord-redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data

volumes:
  mysql_data:
  redis_data:
